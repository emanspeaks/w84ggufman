<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>w84ggufman</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<header>
  <div class="header-title">
    <h1>w84ggufman<small>GGUF Manager</small></h1>
    <span id="app-version"></span>
  </div>
  <div class="resource-bars">
    <div class="resource-meter resource-meter--stacked" id="vram-info" style="display:none">
      <div class="resource-row" id="gpu-row" style="display:none">
        <div class="resource-bar"><div class="resource-bar-fill ok" id="gpu-bar-fill" style="width:0%"></div></div>
        <span id="gpu-text"></span>
      </div>
      <div class="resource-row">
        <div class="resource-bar"><div class="resource-bar-fill ok" id="vram-bar-fill" style="width:0%"></div></div>
        <span id="vram-text"></span>
      </div>
    </div>
    <div class="resource-meter" id="disk-info" style="display:none">
      <div class="resource-bar"><div class="resource-bar-fill ok" id="disk-bar-fill" style="width:0%"></div></div>
      <span id="disk-text"></span>
    </div>
  </div>
  <div class="status-pill-wrap">
    <span id="status-indicator" class="status-unknown" title="Click for options">connecting…</span>
    <div class="status-menu" id="status-menu">
      <button id="restart-btn">Restart llama-server</button>
      <button id="edit-config-btn">Edit config…</button>
      <button id="edit-templates-btn" style="display:none">Edit templates…</button>
      <button id="restart-self-btn">Restart w84ggufman</button>
    </div>
  </div>
  <button id="theme-toggle" title="Toggle light/dark mode">
    <span class="theme-icon">🌙</span>
    <div class="theme-track"><div class="theme-thumb"></div></div>
    <span class="theme-icon">☀</span>
  </button>
</header>
<main>
  <!-- Left panel: Local Models -->
  <section>
    <div class="section-header">
      <h2>Local Models</h2>
      <button class="btn-secondary" id="refresh-btn">Refresh</button>
    </div>
    <div id="local-error" class="msg-error" style="display:none"></div>
    <div id="local-list"><p class="msg-loading">Loading…</p></div>
  </section>

  <!-- Right panel: Select Models -->
  <section>
    <div class="section-header">
      <h2>Select Models</h2>
    </div>
    <p class="hint">
      Find models at
      <a href="https://huggingface.co/models?library=gguf" target="_blank" rel="noopener">HuggingFace GGUF models</a>
    </p>
    <label for="repo-input" style="font-size:0.825rem;font-weight:500;display:block;margin-bottom:4px">HuggingFace repo ID</label>
    <div class="input-row">
      <input type="text" id="repo-input" placeholder="e.g. unsloth/Qwen3-Coder-Next-GGUF" autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="browse-btn">Show</button>
      <a class="btn-secondary" id="hf-link-btn" href="#" target="_blank" rel="noopener"
        style="opacity:0.4;pointer-events:none"><span class="hf-two-line">Browse<br>on HF</span></a>
    </div>
    <div id="repo-error" class="msg-error" style="display:none"></div>
    <div id="repo-results"></div>
  </section>

  <!-- Right panel: Model Card (README) -->
  <section id="readme-section">
    <div class="section-header">
      <h2>Model Card</h2>
      <span id="readme-repo-label" style="font-size:0.72rem;color:#64748b;font-family:monospace;flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:0.75rem"></span>
    </div>
    <div class="readme-body">
      <div id="readme-content" class="readme-content">
        <p class="msg-empty">Browse a repo or click a local model to view its model card.</p>
      </div>
    </div>
  </section>
</main>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-log-wrapper">
    <div id="status-resize-handle"></div>
    <div id="status-log"></div>
  </div>
  <div id="status-bar-main">
    <div id="dl-progress-fill"></div>
    <span id="status-bar-label">Ready</span>
    <span id="status-bar-text"></span>
    <button id="cancel-dl-btn">Cancel</button>
    <span id="status-bar-chevron">▲</span>
  </div>
</div>

<script type="module" src="/app.js"></script>
</body>
</html>
