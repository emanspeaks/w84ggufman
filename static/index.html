<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>w84ggufman</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f172a; color: #e2e8f0;
    min-height: 100vh; padding-bottom: 36px;
    transition: background 0.2s, color 0.2s, padding-bottom 0.25s ease;
  }
  /* ── Header ──────────────────────────────────────────────────────────── */
  header {
    background: #020617; color: #f8fafc; padding: 0.75rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid #1e293b;
  }
  .header-title { display: flex; align-items: center; gap: 0.5rem; flex: 1; }
  header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.01em; line-height: 1.2; }
  header h1 small { display: block; font-size: 0.6rem; font-weight: 400; opacity: 0.55; letter-spacing: 0.04em; }
  #app-version {
    font-size: 0.7rem; color: #475569;
    font-family: 'Menlo', 'Consolas', monospace;
  }
  /* ── Status pill + dropdown ──────────────────────────────────────────────── */
  .status-pill-wrap { position: relative; flex-shrink: 0; }
  #status-indicator {
    font-size: 0.78rem; padding: 3px 10px; border-radius: 12px;
    cursor: pointer; user-select: none; display: block;
  }
  #status-indicator:hover { filter: brightness(1.1); }
  .status-online  { background: #14532d; color: #86efac; }
  .status-offline { background: #7f1d1d; color: #fca5a5; }
  .status-unknown { background: #1e293b; color: #94a3b8; }
  .status-menu {
    display: none; position: absolute; top: calc(100% + 6px); right: 0;
    background: #1e293b; border: 1px solid #334155; border-radius: 7px;
    min-width: 160px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.4);
    overflow: hidden;
  }
  .status-menu.open { display: block; }
  .status-menu button {
    display: block; width: 100%; text-align: left;
    background: transparent; border: none; border-radius: 0;
    color: #cbd5e1; font-size: 0.825rem; font-weight: 400;
    padding: 8px 14px; cursor: pointer; transition: background 0.12s;
  }
  .status-menu button:hover { background: #334155; color: #f1f5f9; }
  html.light .status-menu { background: #fff; border-color: #e2e8f0; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
  html.light .status-menu button { color: #475569; }
  html.light .status-menu button:hover { background: #f1f5f9; color: #0f172a; }
  #theme-toggle {
    background: transparent; border: 1px solid #334155; color: #94a3b8;
    font-size: 0.85rem; padding: 4px 8px; border-radius: 5px;
    cursor: pointer; line-height: 1; flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  #theme-toggle:hover { background: #1e293b; color: #f1f5f9; }
  /* ── Layout ──────────────────────────────────────────────────────────── */
  main {
    display: grid; grid-template-columns: 1fr 1fr 1.5fr; gap: 1.25rem;
    padding: 1.25rem;
  }
  @media (max-width: 1100px) {
    main { grid-template-columns: 1fr 1fr; }
    #readme-section { grid-column: 1 / -1; }
  }
  @media (max-width: 768px) {
    main { grid-template-columns: 1fr; }
    #readme-section { grid-column: auto; }
  }
  section {
    background: #1e293b; border-radius: 10px; padding: 1.25rem;
    border: 1px solid #334155; min-width: 0;
  }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-header h2 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
  /* ── Buttons ─────────────────────────────────────────────────────────── */
  button { cursor: pointer; border: none; border-radius: 5px; font-size: 0.825rem; font-weight: 500; padding: 5px 12px; transition: background 0.15s; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary  { background: #2563eb; color: #fff; }
  .btn-primary:hover:not(:disabled)  { background: #3b82f6; }
  .btn-danger   { background: #991b1b; color: #fca5a5; }
  .btn-danger:hover:not(:disabled)   { background: #b91c1c; color: #fff; }
  .btn-secondary { background: #334155; color: #cbd5e1; }
  .btn-secondary:hover:not(:disabled) { background: #475569; color: #f1f5f9; }
  /* ── Model cards ─────────────────────────────────────────────────────── */
  #local-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .model-card {
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid #334155; border-radius: 7px; padding: 0.625rem 0.75rem;
    background: #0f172a;
  }
  .model-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .model-name { font-size: 0.875rem; font-weight: 500; color: #f1f5f9; word-break: break-all; }
  .model-detail { font-size: 0.75rem; color: #64748b; }
  .badge { font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
  .badge-loaded   { background: #14532d; color: #86efac; }
  .badge-unloaded { background: #1e293b; color: #64748b; }
  .model-actions { display: flex; gap: 0.4rem; align-items: center; flex-shrink: 0; }
  /* ── Config modal ──────────────────────────────────────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65); backdrop-filter: blur(2px);
    z-index: 500;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: #1e293b; border: 1px solid #334155; border-radius: 10px;
    padding: 1.25rem 1.5rem 1.5rem;
    width: min(700px, 95vw); max-height: 85vh;
    display: flex; flex-direction: column; gap: 0.875rem;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55);
  }
  .modal-title { font-size: 0.95rem; font-weight: 600; color: #f1f5f9; }
  .modal-title small { display: block; font-size: 0.72rem; font-weight: 400; color: #64748b; margin-top: 2px; font-family: monospace; }
  .modal textarea {
    flex: 1; min-height: 260px;
    background: #0f172a; border: 1px solid #334155; border-radius: 6px;
    color: #e2e8f0; font-family: 'Menlo','Consolas',monospace; font-size: 0.825rem;
    line-height: 1.5; padding: 0.75rem; resize: vertical; outline: none;
  }
  .modal textarea:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; }
  html.light .modal { background: #f8fafc; border-color: #e2e8f0; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
  html.light .modal-title { color: #1e293b; }
  html.light .modal textarea { background: #fff; border-color: #cbd5e1; color: #0f172a; }
  /* ── Right panel ─────────────────────────────────────────────────────── */
  .hint { font-size: 0.8rem; color: #64748b; margin-bottom: 0.875rem; }
  .hint a { color: #60a5fa; }
  .hint a:hover { color: #93c5fd; }
  .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.875rem; }
  label { color: #94a3b8; }
  input[type="text"] {
    flex: 1; padding: 6px 10px;
    background: #0f172a; border: 1px solid #334155; border-radius: 5px;
    color: #f1f5f9; font-size: 0.875rem; outline: none;
  }
  input[type="text"]::placeholder { color: #475569; }
  input[type="text"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  /* ── Quant grid ─────────────────────────────────────────────────────── */
  #repo-results { display: flex; flex-direction: column; gap: 0; }
  .quant-grid {
    border: 1px solid #1e293b; border-radius: 6px;
    overflow: hidden; margin: 6px 0;
  }
  .quant-row {
    display: flex; align-items: center; gap: 8px;
    padding: 5px 10px; border-bottom: 1px solid #1e293b;
  }
  .quant-row:last-child { border-bottom: none; }
  .quant-bit-label {
    width: 3.5rem; font-size: 0.68rem; color: #475569;
    flex-shrink: 0; text-align: right; padding-right: 4px;
  }
  .quant-tiles { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
  .quant-tile {
    display: inline-flex; align-items: center; gap: 0;
    border: 1px solid #334155; border-radius: 4px;
    font-size: 0.7rem; font-family: monospace; color: #94a3b8;
    cursor: pointer; transition: border-color 0.12s, background 0.12s, color 0.12s;
    overflow: hidden;
  }
  .quant-tile:hover { border-color: #64748b; color: #e2e8f0; }
  .quant-tile.selected { border-color: #3b82f6; background: rgba(59,130,246,0.15); color: #93c5fd; }
  .quant-tile.toobig { border-color: #7f1d1d; color: #9b4444; cursor: default; opacity: 0.7; }
  .quant-tile.vramwarn { border-color: #92400e; }
  .quant-tile.vramwarn .quant-tile-size { color: #f59e0b; }
  .quant-tile-name { padding: 3px 6px; font-weight: 500; }
  .quant-tile-size {
    padding: 3px 6px; font-size: 0.62rem; color: #475569;
    border-left: 1px solid #334155; background: rgba(0,0,0,0.15);
  }
  .quant-tile.selected .quant-tile-size { border-color: rgba(59,130,246,0.4); color: #64748b; }
  /* ── Companion files ─────────────────────────────────────────────────── */
  .companion-section { margin: 8px 0 4px; }
  .companion-section > .sidecars-label { display: block; margin-bottom: 4px; }
  /* ── Download row ───────────────────────────────────────────────────── */
  .dl-action-row {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 0.75rem; padding: 8px 0 2px;
  }
  .dl-selection-hint { font-size: 0.72rem; color: #475569; flex: 1; }
  /* ── Messages ────────────────────────────────────────────────────────── */
  .msg-error   { color: #f87171; font-size: 0.825rem; margin-top: 0.5rem; }
  .msg-empty   { color: #475569; font-size: 0.825rem; font-style: italic; text-align: center; padding: 1rem 0; }
  .msg-loading { color: #64748b; font-size: 0.825rem; }
  /* ── Status bar ──────────────────────────────────────────────────────── */
  :root { --log-height: 200px; }
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #020617; color: #64748b;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 0.7rem; line-height: 1.4;
    border-top: 2px solid #1e293b;
    z-index: 100; transition: border-color 0.2s;
  }
  #status-bar.active { border-top-color: #3b82f6; }
  #status-resize-handle {
    display: none; height: 5px;
    cursor: ns-resize; background: #1e293b;
    transition: background 0.15s;
  }
  #status-resize-handle:hover,
  #status-resize-handle.dragging { background: #334155; }
  #status-bar.expanded #status-resize-handle { display: block; }
  #status-bar-main {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 6px 1rem; min-height: 32px;
    cursor: pointer; user-select: none;
    position: relative; overflow: hidden;
  }
  #dl-progress-fill {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 0%; background: rgba(59,130,246,0.14);
    transition: width 0.6s linear; pointer-events: none;
  }
  #status-bar-main > *:not(#dl-progress-fill) { position: relative; z-index: 1; }
  #status-bar-label {
    color: #334155; white-space: nowrap;
    border-right: 1px solid #1e293b; padding-right: 0.75rem;
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
  }
  #status-bar-text { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #status-bar.active #status-bar-text { color: #e2e8f0; }
  #status-bar-chevron {
    color: #334155; font-size: 0.65rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  #status-bar.expanded #status-bar-chevron { transform: rotate(180deg); }
  #status-log-wrapper { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
  #status-bar.expanded #status-log-wrapper { max-height: var(--log-height); }
  #status-log {
    height: var(--log-height); overflow-y: auto;
    padding: 0.375rem 1rem;
    border-top: 1px solid #1e293b;
    color: #94a3b8; white-space: pre-wrap; word-break: break-all;
    user-select: text; cursor: text;
  }
  #status-log .log-line { display: block; }

  /* ── Light mode ──────────────────────────────────────────────────────── */
  html.light body            { background: #f8fafc; color: #0f172a; }
  html.light header          { background: #f1f5f9; color: #0f172a; border-bottom-color: #cbd5e1; }
  html.light #app-version    { color: #94a3b8; }
  html.light #theme-toggle   { border-color: #cbd5e1; color: #475569; }
  html.light #theme-toggle:hover { background: #e2e8f0; color: #0f172a; }
  html.light section         { background: #ffffff; border-color: #e2e8f0; }
  html.light .section-header h2 { color: #1e293b; }
  html.light .btn-secondary  { background: #e2e8f0; color: #475569; }
  html.light .btn-secondary:hover:not(:disabled) { background: #cbd5e1; color: #0f172a; }
  html.light .model-card     { background: #f8fafc; border-color: #e2e8f0; }
  html.light .model-name     { color: #1e293b; }
  html.light .model-detail   { color: #94a3b8; }
  html.light .badge-loaded   { background: #dcfce7; color: #166534; }
  html.light .badge-unloaded { background: #f1f5f9; color: #94a3b8; }
  html.light .hint           { color: #94a3b8; }
  html.light .hint a         { color: #2563eb; }
  html.light .hint a:hover   { color: #1d4ed8; }
  html.light label           { color: #475569; }
  html.light input[type="text"] { background: #fff; border-color: #cbd5e1; color: #0f172a; }
  html.light input[type="text"]::placeholder { color: #94a3b8; }
  html.light .file-row       { border-bottom-color: #e2e8f0; }
  html.light .file-name      { color: #475569; }
  html.light .file-size      { color: #94a3b8; }
  html.light .msg-error      { color: #dc2626; }
  html.light .msg-empty      { color: #94a3b8; }
  html.light .msg-loading    { color: #94a3b8; }
  html.light .status-online  { background: #dcfce7; color: #166534; }
  html.light .status-offline { background: #fee2e2; color: #991b1b; }
  html.light .status-unknown { background: #f1f5f9; color: #64748b; }
  html.light #status-bar     { background: #f1f5f9; color: #64748b; border-top-color: #e2e8f0; }
  html.light #status-bar.active { border-top-color: #3b82f6; }
  html.light #status-resize-handle { background: #e2e8f0; }
  html.light #status-resize-handle:hover,
  html.light #status-resize-handle.dragging { background: #cbd5e1; }
  html.light #status-log     { border-top-color: #e2e8f0; color: #64748b; }
  html.light #status-bar-label { color: #94a3b8; border-right-color: #e2e8f0; }
  html.light #status-bar.active #status-bar-text { color: #0f172a; }
  html.light #status-bar-chevron { color: #cbd5e1; }
  /* ── Resource bars (disk + VRAM) ─────────────────────────────────────────── */
  .resource-bars { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }
  .disk-bar-wrap { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: #64748b; }
  .disk-bar { height: 6px; width: 80px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .disk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .disk-bar-fill.ok   { background: #22c55e; }
  .disk-bar-fill.warn { background: #f59e0b; }
  .disk-bar-fill.crit { background: #ef4444; }
  html.light .disk-bar { background: #e2e8f0; }
  /* ── Vision & preset badges ──────────────────────────────────────────────── */
  .badge-vision      { background: #1e3a5f; color: #7dd3fc; }
  .badge-warn-preset { background: #7c2d12; color: #fdba74; }
  html.light .quant-grid { border-color: #e2e8f0; }
  html.light .quant-row { border-color: #e2e8f0; }
  html.light .quant-bit-label { color: #94a3b8; }
  html.light .quant-tile { border-color: #cbd5e1; color: #475569; }
  html.light .quant-tile:hover { border-color: #94a3b8; color: #0f172a; }
  html.light .quant-tile.selected { border-color: #3b82f6; color: #1d4ed8; }
  html.light .quant-tile-size { color: #94a3b8; background: rgba(0,0,0,0.04); border-color: #e2e8f0; }
  html.light .dl-selection-hint { color: #94a3b8; }
  /* ── Sidecar checkboxes ──────────────────────────────────────────────────── */
  .file-row-inner { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .sidecars-wrap { display: flex; flex-direction: column; gap: 3px; padding-top: 4px; }
  .sidecars-label { font-size: 0.7rem; color: #475569; }
  .sidecar-row { display: flex; align-items: center; gap: 5px; }
  .sidecar-row input[type="checkbox"] { flex-shrink: 0; accent-color: #3b82f6; cursor: pointer; }
  .sidecar-name { font-size: 0.75rem; font-family: monospace; color: #94a3b8; word-break: break-all; }
  .sidecar-size { font-size: 0.7rem; color: #475569; white-space: nowrap; }
  html.light .sidecars-label { color: #94a3b8; }
  html.light .sidecar-name { color: #475569; }
  html.light .sidecar-size { color: #94a3b8; }
  /* ── Cancel button ───────────────────────────────────────────────────────── */
  #cancel-dl-btn {
    display: none; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
    background: #7f1d1d; color: #fca5a5; border: none; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
  #cancel-dl-btn:hover { background: #991b1b; }
  /* ── Repo ID in model card ───────────────────────────────────────────────── */
  .model-repo-id {
    font-size: 0.72rem; font-family: 'Menlo', 'Consolas', monospace;
    color: #475569; user-select: text; cursor: text; word-break: break-all;
  }
  .model-repo-unknown { color: #334155; font-style: italic; font-family: inherit; }
  html.light .model-repo-id { color: #94a3b8; }
  html.light .model-repo-unknown { color: #cbd5e1; }
  /* ── Tags row ────────────────────────────────────────────────────────────── */
  .tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .badge-tag { background: #1e293b; color: #64748b; border: 1px solid #334155; font-weight: 400; }
  .badge-pipeline { background: #1a2e4a; color: #93c5fd; }
  html.light .badge-tag { background: #f1f5f9; color: #64748b; border-color: #e2e8f0; }
  html.light .badge-pipeline { background: #dbeafe; color: #1d4ed8; }
  /* ── Clickable model card ────────────────────────────────────────────────── */
  .model-card.clickable { cursor: pointer; }
  .model-card.clickable:hover { border-color: #475569; }
  html.light .model-card.clickable:hover { border-color: #94a3b8; }
  /* ── README panel ────────────────────────────────────────────────────────── */
  .readme-body { padding-right: 4px; }
  .readme-content { font-size: 0.82rem; line-height: 1.65; color: #cbd5e1; }
  .readme-content h1 { font-size: 1.2rem; font-weight: 700; margin: 1rem 0 0.4rem; color: #f1f5f9; border-bottom: 1px solid #334155; padding-bottom: 0.3rem; }
  .readme-content h2 { font-size: 1rem; font-weight: 600; margin: 1rem 0 0.35rem; color: #e2e8f0; }
  .readme-content h3 { font-size: 0.9rem; font-weight: 600; margin: 0.75rem 0 0.3rem; color: #cbd5e1; }
  .readme-content h4 { font-size: 0.85rem; font-weight: 600; margin: 0.6rem 0 0.2rem; color: #94a3b8; }
  .readme-content p { margin: 0.4rem 0; }
  .readme-content pre { background: #0f172a; border: 1px solid #334155; border-radius: 5px; padding: 0.5rem 0.75rem; overflow-x: auto; font-size: 0.75rem; margin: 0.5rem 0; }
  .readme-content code { font-family: 'Menlo','Consolas',monospace; font-size: 0.8em; background: #0f172a; padding: 1px 4px; border-radius: 3px; color: #e2e8f0; }
  .readme-content pre code { background: none; padding: 0; font-size: inherit; }
  .readme-content a { color: #60a5fa; text-decoration: none; }
  .readme-content a:hover { text-decoration: underline; }
  .readme-content ul,.readme-content ol { padding-left: 1.4rem; margin: 0.4rem 0; }
  .readme-content li { margin: 0.15rem 0; }
  .readme-content table { border-collapse: collapse; width: 100%; margin: 0.5rem 0; font-size: 0.78rem; }
  .readme-content th,.readme-content td { border: 1px solid #334155; padding: 4px 8px; text-align: left; }
  .readme-content th { background: #162032; color: #f1f5f9; font-weight: 600; }
  .readme-content hr { border: none; border-top: 1px solid #334155; margin: 0.75rem 0; }
  .readme-content blockquote { border-left: 3px solid #334155; padding-left: 0.75rem; color: #94a3b8; margin: 0.4rem 0; }
  .readme-content strong { font-weight: 600; color: #e2e8f0; }
  .readme-content em { font-style: italic; }
  .readme-content img { max-width: 100%; height: auto; display: block; }
  html.light .readme-content { color: #475569; }
  html.light .readme-content h1 { color: #1e293b; border-bottom-color: #e2e8f0; }
  html.light .readme-content h2,.readme-content h3 { color: #1e293b; }
  html.light .readme-content h4 { color: #64748b; }

</style>
</head>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-log-wrapper">
    <div id="status-resize-handle"></div>
    <div id="status-log"></div>
  </div>
  <div id="status-bar-main">
    <div id="dl-progress-fill"></div>
    <span id="status-bar-label">Ready</span>
    <span id="status-bar-text"></span>
    <button id="cancel-dl-btn">Cancel</button>
    <span id="status-bar-chevron">▲</span>
  </div>

<script>
'use strict';

let downloadInProgress = false;
let activeEventSource = null;
let warnDownloadBytes = 0;
let warnVramBytes = 0;
let diskFreeBytes = 0;

// ── Theme ──────────────────────────────────────────────────────────────────

(function initTheme() {
  const stored = localStorage.getItem('theme');
  const isLight = stored === 'light';
  if (isLight) document.documentElement.classList.add('light');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀';
})();

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀';
});

// ── Utilities ──────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBytes(n) {
  if (n == null) return 'unknown';
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(1) + ' KiB';
  if (n < 1073741824) return (n / 1048576).toFixed(1) + ' MiB';
  return (n / 1073741824).toFixed(2) + ' GiB';
}

function formatETA(secs) {
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60), s = secs % 60;
  return m + 'm ' + (s < 10 ? '0' : '') + s + 's';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function clearErr(id) { showErr(id, ''); }

// ── Status bar ─────────────────────────────────────────────────────────────

function appendLogLine(line) {
  const log = document.getElementById('status-log');
  const atBottom = log.scrollHeight - log.scrollTop <= log.clientHeight + 4;
  const span = document.createElement('span');
  span.className = 'log-line';
  span.textContent = line;
  log.appendChild(span);
  if (atBottom) log.scrollTop = log.scrollHeight;
}

function setStatusBar(label, text, active) {
  const bar = document.getElementById('status-bar');
  document.getElementById('status-bar-label').textContent = label;
  document.getElementById('status-bar-text').textContent = text;
  bar.classList.toggle('active', active);
  if (text) appendLogLine(text);
}

function toggleStatusBar() {
  const bar = document.getElementById('status-bar');
  bar.classList.toggle('expanded');
  if (bar.classList.contains('expanded')) {
    const log = document.getElementById('status-log');
    log.scrollTop = log.scrollHeight;
  }
}

document.getElementById('status-bar-main').addEventListener('click', toggleStatusBar);

// ── Log resize ─────────────────────────────────────────────────────────────

(function initResize() {
  const handle = document.getElementById('status-resize-handle');
  let startY = 0, startHeight = 200;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startY = e.clientY;
    startHeight = parseInt(getComputedStyle(document.documentElement)
      .getPropertyValue('--log-height'), 10) || 200;
    handle.classList.add('dragging');

    function onMove(e) {
      const height = Math.max(80, Math.min(600, startHeight + (startY - e.clientY)));
      document.documentElement.style.setProperty('--log-height', height + 'px');
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// Keep body padding-bottom equal to the status bar height so content is
// never obscured by the fixed bar, whether collapsed, expanded, or resized.
(function() {
  const bar = document.getElementById('status-bar');
  new ResizeObserver(() => {
    document.body.style.paddingBottom = bar.offsetHeight + 'px';
  }).observe(bar);
})();

// ── Local models ───────────────────────────────────────────────────────────

async function fetchLocalModels() {
  clearErr('local-error');
  try {
    const resp = await fetch('/api/local');
    if (!resp.ok) throw new Error(await resp.text());
    const models = await resp.json();
    renderLocalModels(models);
  } catch (e) {
    showErr('local-error', 'Failed to load local models: ' + e.message);
    document.getElementById('local-list').innerHTML = '';
  }
}

function renderLocalModels(models) {
  const list = document.getElementById('local-list');
  if (!models.length) {
    list.innerHTML = '<p class="msg-empty">No models found in models directory.</p>';
    return;
  }
  list.innerHTML = '';
  for (const m of models) {
    const card = document.createElement('div');
    card.className = 'model-card' + (m.repoId ? ' clickable' : '');
    card.dataset.modelName = m.name;
    const visionBadge = m.isVision ? ' <span class="badge badge-vision">Vision</span>' : '';
    const presetWarn = m.isVision && !m.inPreset
      ? ' <span class="badge badge-warn-preset" title="Not in managed.ini — add to preset so llama-server loads it">Preset missing</span>'
      : '';
    const repoLine = m.repoId
      ? `<span class="model-repo-id">${esc(m.repoId)}</span>`
      : `<span class="model-repo-id model-repo-unknown">(source unknown)</span>`;
    card.innerHTML = `
      <div class="model-meta">
        <span class="model-name">${esc(m.name)}${visionBadge}${presetWarn}</span>
        ${repoLine}
        <span class="model-detail">
          ${esc(formatBytes(m.sizeBytes))} &middot; ${m.files.length} file${m.files.length !== 1 ? 's' : ''}
          &nbsp;<span class="badge loaded-badge ${m.loaded ? 'badge-loaded' : 'badge-unloaded'}" title="Loaded = currently active in llama-server">${m.loaded ? 'Loaded' : 'Unloaded'}</span>
        </span>
      </div>
      <div class="model-actions">
        <button class="btn-secondary config-btn">Config…</button>
        <button class="btn-danger delete-btn">Delete</button>
      </div>
    `;
    if (m.repoId) {
      card.addEventListener('click', (e) => {
        if (e.target.closest('button')) return;
        document.getElementById('repo-input').value = m.repoId;
        browseRepo();
      });
    }
    card.querySelector('.config-btn').addEventListener('click', () => openConfigModal(m.name));
    card.querySelector('.delete-btn').addEventListener('click', () => deleteModel(m.name));
    list.appendChild(card);
  }
}

async function deleteModel(name) {
  if (!confirm(`Delete model "${name}"?\n\nThis will remove all files and cannot be undone.`)) return;
  clearErr('local-error');
  try {
    const resp = await fetch('/api/local/' + encodeURIComponent(name), { method: 'DELETE' });
    if (resp.status === 404) { showErr('local-error', 'Model not found.'); return; }
    if (!resp.ok) throw new Error(await resp.text());
    setStatusBar('Ready', 'Model deleted, restarting service…', false);
    fetchLocalModels();
  } catch (e) {
    showErr('local-error', 'Delete failed: ' + e.message);
  }
}

// ── Repo browser ───────────────────────────────────────────────────────────

async function browseRepo() {
  const repoId = document.getElementById('repo-input').value.trim();
  if (!repoId) return;
  clearErr('repo-error');
  const results = document.getElementById('repo-results');
  results.innerHTML = '<p class="msg-loading">Fetching file list…</p>';
  fetchAndRenderReadme(repoId);
  try {
    const resp = await fetch('/api/repo?id=' + encodeURIComponent(repoId));
    if (!resp.ok) throw new Error(await resp.text());
    const info = await resp.json();
    renderRepoInfo(repoId, info);
  } catch (e) {
    results.innerHTML = '';
    showErr('repo-error', 'Failed to fetch repo: ' + e.message);
  }
}

// ── Quant grid helpers ──────────────────────────────────────────────────────

function commonPrefix(arr) {
  if (!arr.length) return '';
  return arr.slice(1).reduce((p, s) => {
    while (!s.startsWith(p)) p = p.slice(0, -1);
    return p;
  }, arr[0]);
}

// Extract the display label for a quant tile (the part after the model prefix).
function quantDisplayName(filename, prefix) {
  const base = filename.replace(/\.gguf$/i, '');
  const tail = base.startsWith(prefix) ? base.slice(prefix.length).replace(/^[-_]/, '') : base;
  return tail || base;
}

// Bit depth is the first digit run after a known quant family prefix.
// Known families: IQ, TQ, BF, MXFP, NVFP, Q, F (longest-first for alternation).
// Strips leading UD- variant prefix, then matches at start-of-string (when the
// common prefix has been stripped) or after a separator (when the full filename
// is used as the display name because there was no common prefix to strip).
function quantBitDepth(displayName) {
  const m = displayName.replace(/^UD-/i, '').match(/(?:^|[-_.])(?:IQ|TQ|BF|MXFP|NVFP|[QF])(\d+)/i);
  return m ? parseInt(m[1]) : 999;
}

function renderRepoInfo(repoId, info) {
  const results = document.getElementById('repo-results');
  const files = info.models || [];
  const sidecars = info.sidecars || [];
  if (!files.length && !sidecars.length) {
    results.innerHTML = '<p class="msg-empty">No GGUF files found in this repo.</p>';
    return;
  }
  results.innerHTML = '';

  // Tags row
  const tagItems = [];
  if (info.pipelineTag) tagItems.push(`<span class="badge badge-pipeline">${esc(info.pipelineTag)}</span>`);
  for (const t of (info.tags || [])) {
    if (t !== info.pipelineTag) tagItems.push(`<span class="badge badge-tag">${esc(t)}</span>`);
  }
  if (tagItems.length) {
    const row = document.createElement('div');
    row.className = 'tags-row';
    row.innerHTML = tagItems.join('');
    results.appendChild(row);
  }

  if (info.isVision) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:4px 0 8px;font-size:0.78rem;';
    if (sidecars.length > 0) {
      hdr.innerHTML = '<span class="badge badge-vision">Vision</span> &nbsp;<span style="color:#7dd3fc">Multimodal projector included — select companion files below.</span>';
    } else {
      hdr.innerHTML = '<span class="badge badge-vision">Vision</span> &nbsp;<span style="color:#fbbf24">No companion files in this repo — check the model card for the mmproj source.</span>';
    }
    results.appendChild(hdr);
  }

  if (files.length) {
    // Compute display prefix: common prefix of all base filenames (without .gguf).
    const bases = files.map(f => f.filename.replace(/\.gguf$/i, ''));
    const prefix = commonPrefix(bases).replace(/[-_]+$/, '');

    // Group files by bit-depth for the grid rows.
    const byBit = new Map();
    for (const f of files) {
      const label = f.displayName || quantDisplayName(f.filename, prefix);
      const bits  = quantBitDepth(label);
      if (!byBit.has(bits)) byBit.set(bits, []);
      byBit.get(bits).push({ f, label });
    }
    const sortedBits = [...byBit.keys()].sort((a, b) => a - b);

    // Track which filenames are selected.
    const selected = new Set();

    const grid = document.createElement('div');
    grid.className = 'quant-grid';

    for (const bits of sortedBits) {
      const group = byBit.get(bits);
      const row = document.createElement('div');
      row.className = 'quant-row';

      const bitLabel = document.createElement('span');
      bitLabel.className = 'quant-bit-label';
      bitLabel.textContent = bits === 999 ? '?' : bits + '-bit';
      row.appendChild(bitLabel);

      const tilesWrap = document.createElement('div');
      tilesWrap.className = 'quant-tiles';

      for (const { f, label } of group) {
        const tooBig = diskFreeBytes > 0 && f.size != null && f.size > diskFreeBytes;
        const vramWarn = warnVramBytes > 0 && f.size != null && f.size > warnVramBytes;
        const tile = document.createElement('span');
        tile.className = 'quant-tile' + (tooBig ? ' toobig' : '') + (vramWarn ? ' vramwarn' : '');
        tile.title = f.filename;
        tile.innerHTML =
          `<span class="quant-tile-name">${esc(label)}</span>` +
          `<span class="quant-tile-size">${vramWarn ? '⚠ ' : ''}${esc(formatBytes(f.size))}</span>`;

        tile.addEventListener('click', () => {
          if (selected.has(f.filename)) {
            selected.delete(f.filename);
            tile.classList.remove('selected');
          } else {
            selected.add(f.filename);
            tile.classList.add('selected');
          }
          refreshDlBtn();
        });
        tilesWrap.appendChild(tile);
      }
      row.appendChild(tilesWrap);
      grid.appendChild(row);
    }
    results.appendChild(grid);

    // Companion files section (shared across all quants).
    let companionEl = null;
    if (sidecars.length > 0) {
      companionEl = document.createElement('div');
      companionEl.className = 'companion-section';
      const items = sidecars.map((s, i) =>
        `<div class="sidecar-row">
          <input type="checkbox" class="sidecar-cb" data-idx="${i}" checked>
          <span class="sidecar-name">${esc(s.filename)}</span>
          ${s.size != null ? `<span class="sidecar-size">${esc(formatBytes(s.size))}</span>` : ''}
        </div>`
      ).join('');
      companionEl.innerHTML = `<span class="sidecars-label">Additional files:</span><div class="sidecars-wrap">${items}</div>`;
      results.appendChild(companionEl);
    }

    // Single download button row at the bottom.
    const dlRow = document.createElement('div');
    dlRow.className = 'dl-action-row';
    const hint = document.createElement('span');
    hint.className = 'dl-selection-hint';
    hint.textContent = 'Select one or more quants above';
    const dlBtn = document.createElement('button');
    dlBtn.className = 'btn-primary';
    dlBtn.disabled = true;
    dlBtn.textContent = 'Download';

    function refreshDlBtn() {
      const n = selected.size;
      dlBtn.disabled = downloadInProgress || n === 0;
      hint.textContent = n === 0 ? 'Select one or more quants above'
        : n === 1 ? '1 quant selected'
        : n + ' quants selected';
      dlBtn.textContent = n > 1 ? `Download (${n})` : 'Download';
    }

    dlBtn.addEventListener('click', () => {
      const selFiles = files.filter(f => selected.has(f.filename));
      const checkedSidecars = companionEl
        ? [...companionEl.querySelectorAll('.sidecar-cb:checked')].map(cb => sidecars[+cb.dataset.idx].filename)
        : [];
      const sidecarSize = companionEl
        ? [...companionEl.querySelectorAll('.sidecar-cb:checked')].reduce((s, cb) => s + (sidecars[+cb.dataset.idx].size || 0), 0)
        : 0;
      const totalSize = selFiles.reduce((s, f) => s + (f.size || 0), 0) + sidecarSize;
      startDownload(repoId, selFiles.map(f => f.filename), checkedSidecars, totalSize);
    });

    dlRow.appendChild(hint);
    dlRow.appendChild(dlBtn);
    results.appendChild(dlRow);
  }
}

// ── Download ───────────────────────────────────────────────────────────────

async function startDownload(repoId, filenames, sidecarFiles, totalSize, force) {
  if (downloadInProgress) return;
  if (!Array.isArray(filenames)) filenames = [filenames]; // compat
  if (warnDownloadBytes > 0 && totalSize != null && totalSize > warnDownloadBytes) {
    const gb = (totalSize / 1073741824).toFixed(2);
    if (!confirm(`This download is ${gb} GiB. Continue?`)) return;
  }
  if (warnVramBytes > 0 && totalSize != null && totalSize > warnVramBytes) {
    const gib = (totalSize / (1024 ** 3)).toFixed(2);
    if (!confirm(`This model (${gib} GiB) may exceed your VRAM limit. Continue anyway?`)) return;
  }
  const body = { repoId, filenames, totalBytes: totalSize || 0 };
  if (sidecarFiles && sidecarFiles.length) body.sidecarFiles = sidecarFiles;
  if (force) body.force = true;
  let resp;
  try {
    resp = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  } catch (e) {
    setStatusBar('Error', 'Failed to start download: ' + e.message, false);
    return;
  }
  if (resp.status === 409) {
    let conflict;
    try { conflict = await resp.json(); } catch (_) { conflict = {}; }
    if (conflict.conflict === 'exists') {
      const repoLine = conflict.existingRepoId ? `\nOriginally from: ${conflict.existingRepoId}` : '';
      if (!confirm(`Model "${conflict.modelName}" already exists.${repoLine}\n\nReplace it with a fresh download?`)) return;
      return startDownload(repoId, filenames, sidecarFiles, totalSize, true);
    }
    setStatusBar('Error', 'Download conflict: ' + (conflict.message || resp.statusText), false);
    return;
  }
  if (!resp.ok) {
    setStatusBar('Error', 'Failed to start download: ' + (await resp.text()), false);
    return;
  }
  setDownloadState(true);
  setStatusBar('Download', 'Starting…', true);
  openSSE();
}

async function cancelDownload() {
  await fetch('/api/download/cancel', { method: 'POST' });
}

function openSSE() {
  if (activeEventSource) {
    activeEventSource.close();
    activeEventSource = null;
  }

  const es = new EventSource('/api/download/status');
  activeEventSource = es;

  es.addEventListener('line', (e) => {
    setStatusBar('Download', JSON.parse(e.data), true);
  });

  es.addEventListener('progress', (e) => {
    const p = JSON.parse(e.data);
    const fill = document.getElementById('dl-progress-fill');
    if (p.pct >= 0) fill.style.width = p.pct + '%';
    let text = p.pct >= 0 ? p.pct + '%' : formatBytes(p.dlBytes);
    if (p.speed > 0) text += ' — ' + formatBytes(p.speed) + '/s';
    if (p.eta > 0) text += ' (' + formatETA(p.eta) + ')';
    document.getElementById('status-bar-label').textContent = 'Download';
    document.getElementById('status-bar-text').textContent = text;
  });

  es.addEventListener('status', (e) => {
    const msg = JSON.parse(e.data);
    es.close();
    activeEventSource = null;
    document.getElementById('dl-progress-fill').style.width = '0%';
    if (msg.status === 'done') {
      setStatusBar('Ready', 'Download complete', false);
      setDownloadState(false);
      fetchLocalModels();
      pollStatus();
    } else if (msg.status === 'idle') {
      setStatusBar('Ready', '', false);
      setDownloadState(false);
    }
  });

  es.onerror = () => {
    es.close();
    activeEventSource = null;
    document.getElementById('dl-progress-fill').style.width = '0%';
    setStatusBar('Error', 'Connection lost', false);
    // Do not clear downloadInProgress — pollStatus will reconnect SSE if the
    // download is still running on the server.
  };
}

function setDownloadState(inProgress) {
  downloadInProgress = inProgress;
  document.querySelectorAll('.dl-btn').forEach(btn => { btn.disabled = inProgress; });
  document.getElementById('cancel-dl-btn').style.display = inProgress ? 'inline-block' : 'none';
}

// ── Status pill menu ───────────────────────────────────────────────────────

function toggleStatusMenu(e) {
  e.stopPropagation();
  document.getElementById('status-menu').classList.toggle('open');
}

document.addEventListener('click', () => {
  document.getElementById('status-menu').classList.remove('open');
});

document.getElementById('status-indicator').addEventListener('click', toggleStatusMenu);

// ── Restart service ────────────────────────────────────────────────────────

async function restartService() {
  document.getElementById('status-menu').classList.remove('open');
  if (!confirm('Restart llama-server service?\n\nThe server will be briefly unavailable.')) return;
  const btn = document.getElementById('restart-btn');
  btn.disabled = true;
  setStatusBar('Restart', 'Restarting llama-server…', true);
  try {
    const resp = await fetch('/api/restart', { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    setStatusBar('Ready', 'Service restarted successfully', false);
    pollStatus();
  } catch (e) {
    setStatusBar('Error', 'Restart failed: ' + e.message, false);
  } finally {
    btn.disabled = false;
  }
}

async function restartSelf() {
  document.getElementById('status-menu').classList.remove('open');
  if (!confirm('Restart w84ggufman?\n\nThe page will reload automatically once it comes back up.')) return;
  const btn = document.getElementById('restart-self-btn');
  btn.disabled = true;
  setStatusBar('Restart', 'Restarting w84ggufman…', true);
  try {
    await fetch('/api/restart-self', { method: 'POST' });
  } catch (_) { /* process dying causes network error — that's expected */ }
  // Wait for the server to go down then come back up.
  await new Promise(r => setTimeout(r, 1200));
  for (let i = 0; i < 30; i++) {
    try {
      const r = await fetch('/api/status');
      if (r.ok) { location.reload(); return; }
    } catch (_) {}
    await new Promise(r => setTimeout(r, 1000));
  }
  setStatusBar('Error', 'w84ggufman did not come back — check the service logs', false);
  btn.disabled = false;
}

// ── Config modal ───────────────────────────────────────────────────────────

async function openConfigModal(name) {
  let body = '';
  try {
    const resp = await fetch('/api/preset/raw/' + encodeURIComponent(name));
    if (resp.ok) body = await resp.text();
  } catch (_) {}

  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-title" id="modal-title">
        Config
        <small>${esc(name)}</small>
      </div>
      <textarea spellcheck="false" placeholder="; llama-server preset settings for this model\nmodel = /path/to/model.gguf\nctx-size = 65536">${esc(body)}</textarea>
      <div class="modal-actions">
        <button class="btn-secondary" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  `;

  const ta = backdrop.querySelector('textarea');

  function closeModal() {
    document.body.removeChild(backdrop);
    document.removeEventListener('keydown', onKey);
  }

  function onKey(e) {
    if (e.key === 'Escape') closeModal();
  }

  backdrop.querySelector('#modal-cancel').addEventListener('click', closeModal);

  backdrop.querySelector('#modal-save').addEventListener('click', async () => {
    const saveBtn = backdrop.querySelector('#modal-save');
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    try {
      const resp = await fetch('/api/preset/raw/' + encodeURIComponent(name), {
        method: 'PUT',
        headers: { 'Content-Type': 'text/plain' },
        body: ta.value,
      });
      if (!resp.ok) throw new Error(await resp.text());
      closeModal();
      setStatusBar('Ready', 'Config saved for ' + name, false);
    } catch (e) {
      setStatusBar('Error', 'Save failed: ' + e.message, false);
      saveBtn.disabled = false;
      saveBtn.textContent = 'Save';
    }
  });

  // Close on backdrop click (outside the modal box).
  backdrop.addEventListener('click', (e) => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', onKey);

  document.body.appendChild(backdrop);
  ta.focus();
  ta.setSelectionRange(0, 0);
}

// ── README ─────────────────────────────────────────────────────────────────

async function fetchAndRenderReadme(repoId) {
  const content = document.getElementById('readme-content');
  const label = document.getElementById('readme-repo-label');
  label.textContent = repoId;
  content.innerHTML = '<p class="msg-loading">Loading…</p>';
  try {
    const resp = await fetch('/api/readme?id=' + encodeURIComponent(repoId));
    if (resp.status === 404) {
      content.innerHTML = '<p class="msg-empty">No README found for this repo.</p>';
      return;
    }
    if (!resp.ok) throw new Error(await resp.text());
    content.innerHTML = await resp.text();
  } catch (e) {
    content.innerHTML = `<p class="msg-error">Failed to load README: ${esc(e.message)}</p>`;
  }
}

// ── Status polling ─────────────────────────────────────────────────────────

async function pollStatus() {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) return;
    const s = await resp.json();
    const el = document.getElementById('status-indicator');
    el.textContent = s.llamaReachable ? 'llama-server: online' : 'llama-server: offline';
    el.className = 'status-indicator ' + (s.llamaReachable ? 'status-online' : 'status-offline');
    if (s.version) {
      const ver = document.getElementById('app-version');
      if (!ver.textContent) ver.textContent = s.version;
    }
    if (s.disk && s.disk.totalBytes > 0) {
      diskFreeBytes = s.disk.freeBytes;
      const pct = Math.round(s.disk.usedBytes / s.disk.totalBytes * 100);
      const fill = document.getElementById('disk-bar-fill');
      fill.style.width = pct + '%';
      fill.className = 'disk-bar-fill ' + (pct >= 90 ? 'crit' : pct >= 75 ? 'warn' : 'ok');
      document.getElementById('disk-text').textContent = formatBytes(s.disk.freeBytes) + ' free';
      document.getElementById('disk-info').style.display = 'flex';
    }
    if (s.vramUsedKnown && s.vramBytes > 0) {
      const pct = Math.round(s.vramUsedBytes / s.vramBytes * 100);
      const fill = document.getElementById('vram-bar-fill');
      fill.style.width = pct + '%';
      fill.className = 'disk-bar-fill ' + (pct >= 90 ? 'crit' : pct >= 75 ? 'warn' : 'ok');
      document.getElementById('vram-text').textContent =
        'VRAM: ' + formatBytes(s.vramUsedBytes) + ' / ' + formatBytes(s.vramBytes);
      document.getElementById('vram-info').style.display = 'flex';
    }
    if (s.warnDownloadBytes) warnDownloadBytes = s.warnDownloadBytes;
    if (s.warnVramBytes) warnVramBytes = s.warnVramBytes;
    // Update loaded badges on existing cards without re-rendering
    if (s.loadedModels) {
      const loadedSet = new Set(s.loadedModels);
      document.querySelectorAll('[data-model-name]').forEach(card => {
        const badge = card.querySelector('.loaded-badge');
        if (!badge) return;
        const isLoaded = loadedSet.has(card.dataset.modelName);
        badge.className = 'badge loaded-badge ' + (isLoaded ? 'badge-loaded' : 'badge-unloaded');
        badge.textContent = isLoaded ? 'Loaded' : 'Unloaded';
      });
    }
    if (s.downloadInProgress && !activeEventSource) {
      setDownloadState(true);
      openSSE();
    } else if (!s.downloadInProgress && downloadInProgress && !activeEventSource) {
      setDownloadState(false);
    }
  } catch (_) { /* network error, ignore */ }
}

// ── Init ───────────────────────────────────────────────────────────────────

document.getElementById('refresh-btn').addEventListener('click', () => { fetchLocalModels(); pollStatus(); });
document.getElementById('browse-btn').addEventListener('click', browseRepo);
document.getElementById('restart-btn').addEventListener('click', restartService);
document.getElementById('restart-self-btn').addEventListener('click', restartSelf);
document.getElementById('cancel-dl-btn').addEventListener('click', cancelDownload);
document.getElementById('status-menu').addEventListener('click', (e) => e.stopPropagation());
document.getElementById('repo-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') browseRepo();
});

fetchLocalModels();
pollStatus();
setInterval(pollStatus, 5000);
</script>
