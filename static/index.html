<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>w84ggufman</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>
<div id="version-banner" style="display:none">
  <span id="version-banner-msg"></span>
  <div class="banner-actions">
    <button id="version-banner-refresh">Refresh page</button>
    <button id="version-banner-dismiss">Dismiss</button>
  </div>
</div>
<header>
  <div class="header-title">
    <h1>w84ggufman<small>GGUF Manager</small></h1>
    <span id="app-version"></span>
    <button id="updates-badge" class="updates-badge" style="display:none" title="Model updates available">Updates available</button>
    <a class="github-link" href="https://github.com/emanspeaks/w84ggufman" target="_blank" rel="noopener" title="View on GitHub">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="18" height="18" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>
  <div class="resource-bars">
    <div class="resource-meter" id="disk-info" style="display:none">
      <div class="resource-bar"><div class="resource-bar-fill ok" id="disk-bar-fill" style="width:0%"></div></div>
      <span id="disk-text"></span>
    </div>
    <div class="resource-meter resource-meter--stacked" id="ram-info" style="display:none">
      <div class="resource-row" id="gpu-row" style="display:none">
        <div class="resource-bar"><div class="resource-bar-fill ok" id="gpu-bar-fill" style="width:0%"></div></div>
        <span id="gpu-text"></span>
      </div>
      <div class="resource-row">
        <div class="resource-bar"><div class="resource-bar-fill ok" id="ram-bar-fill" style="width:0%"></div></div>
        <span id="ram-text"></span>
      </div>
    </div>
  </div>
  <div class="status-pill-wrap">
    <span id="status-indicator" class="status-unknown" title="Click for options">connecting…</span>
    <div class="status-menu" id="status-menu">
      <button id="open-server-btn">Open server…</button>
      <button id="restart-btn">Restart llama-server</button>
      <button id="edit-config-btn">Edit config…</button>
      <button id="edit-templates-btn" style="display:none">Edit W84 config…</button>
      <button id="restart-self-btn">Restart w84ggufman</button>
    </div>
  </div>
  <button id="theme-toggle" title="Toggle light/dark mode">
    <span class="theme-icon">🌙</span>
    <div class="theme-track"><div class="theme-thumb"></div></div>
    <span class="theme-icon">☀</span>
  </button>
</header>
<main>
  <!-- Left panel: Local Models -->
  <section>
    <div class="section-header">
      <h2>Local Models</h2>
      <button class="btn-secondary" id="refresh-btn">Refresh</button>
    </div>
    <div id="local-error" class="msg-error" style="display:none"></div>
    <div id="local-list"><p class="msg-loading">Loading…</p></div>
  </section>

  <!-- Right panel: Select Models -->
  <section>
    <div class="section-header">
      <h2>Select Models</h2>
    </div>
    <p class="hint">
      Find models at
      <a href="https://huggingface.co/models?library=gguf" target="_blank" rel="noopener">HuggingFace GGUF models</a>
    </p>
    <label for="repo-input" style="font-size:0.825rem;font-weight:500;display:block;margin-bottom:4px">HuggingFace repo ID</label>
    <div class="input-row">
      <input type="text" id="repo-input" placeholder="e.g. unsloth/Qwen3-Coder-Next-GGUF" autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="browse-btn">Show</button>
      <a class="btn-secondary" id="hf-link-btn" href="#" target="_blank" rel="noopener"
        style="opacity:0.4;pointer-events:none"><span class="hf-two-line">Browse<br>on HF</span></a>
    </div>
    <div id="repo-error" class="msg-error" style="display:none"></div>
    <div id="repo-results"></div>
  </section>

  <!-- Right panel: Model Card (README) -->
  <section id="readme-section">
    <div class="section-header">
      <h2>Model Card</h2>
      <span id="readme-repo-label" style="font-size:0.72rem;color:#64748b;font-family:monospace;flex:1;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-left:0.75rem"></span>
    </div>
    <div class="readme-body">
      <div id="readme-content" class="readme-content">
        <p class="msg-empty">Browse a repo or click a local model to view its model card.</p>
      </div>
    </div>
  </section>
</main>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-log-wrapper">
    <div id="status-resize-handle"></div>
    <div id="status-log" tabindex="-1"></div>
  </div>
  <div id="queue-panel" style="display:none"></div>
  <div id="status-bar-main">
    <div id="dl-progress-fill"></div>
    <span id="status-bar-label">Ready</span>
    <span id="status-bar-text"></span>
    <button id="cancel-dl-btn">Cancel</button>
    <span id="status-bar-chevron">▲</span>
  </div>
</div>

<!-- Monaco Editor (VS Code's editor) -->
<script>
  // Workers can't load cross-origin directly; bootstrap them via a data URI
  // that sets baseUrl and importScripts the actual worker bundle.
  self.MonacoEnvironment = {
    getWorkerUrl: function () {
      return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(
        "self.MonacoEnvironment = { baseUrl: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/' };" +
        "importScripts('https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/base/worker/workerMain.js');"
      );
    },
  };
</script>
<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs/loader.js"></script>
<script>
  require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.0/min/vs' } });
  window.monacoReady = new Promise(function (resolve) {
    require(['vs/editor/editor.main'], function () { resolve(window.monaco); });
  });
</script>
<script type="module" src="/app.js"></script>
</body>
</html>
