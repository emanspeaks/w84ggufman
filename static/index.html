<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>gguf-manager</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #0f172a; color: #e2e8f0;
    min-height: 100vh; padding-bottom: 36px;
    transition: background 0.2s, color 0.2s;
  }
  /* ── Header ──────────────────────────────────────────────────────────── */
  header {
    background: #020617; color: #f8fafc; padding: 0.75rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
    border-bottom: 1px solid #1e293b;
  }
  .header-title { display: flex; align-items: baseline; gap: 0.5rem; flex: 1; }
  header h1 { font-size: 1.2rem; font-weight: 600; letter-spacing: -0.01em; }
  #app-version {
    font-size: 0.7rem; color: #475569;
    font-family: 'Menlo', 'Consolas', monospace;
  }
  #status-indicator { font-size: 0.78rem; padding: 3px 10px; border-radius: 12px; }
  .status-online  { background: #14532d; color: #86efac; }
  .status-offline { background: #7f1d1d; color: #fca5a5; }
  .status-unknown { background: #1e293b; color: #94a3b8; }
  .btn-restart {
    background: transparent; border: 1px solid #334155; color: #94a3b8;
    font-size: 0.75rem; padding: 4px 10px; border-radius: 5px;
    cursor: pointer; transition: background 0.15s, color 0.15s; white-space: nowrap;
  }
  .btn-restart:hover:not(:disabled) { background: #1e293b; color: #f1f5f9; }
  .btn-restart:disabled { opacity: 0.45; cursor: not-allowed; }
  #theme-toggle {
    background: transparent; border: 1px solid #334155; color: #94a3b8;
    font-size: 0.85rem; padding: 4px 8px; border-radius: 5px;
    cursor: pointer; line-height: 1; flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  #theme-toggle:hover { background: #1e293b; color: #f1f5f9; }
  /* ── Layout ──────────────────────────────────────────────────────────── */
  main {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1.25rem;
    padding: 1.25rem; max-width: 1280px; margin: 0 auto;
  }
  @media (max-width: 768px) { main { grid-template-columns: 1fr; } }
  section {
    background: #1e293b; border-radius: 10px; padding: 1.25rem;
    border: 1px solid #334155;
  }
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-header h2 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
  /* ── Buttons ─────────────────────────────────────────────────────────── */
  button { cursor: pointer; border: none; border-radius: 5px; font-size: 0.825rem; font-weight: 500; padding: 5px 12px; transition: background 0.15s; }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-primary  { background: #2563eb; color: #fff; }
  .btn-primary:hover:not(:disabled)  { background: #3b82f6; }
  .btn-danger   { background: #991b1b; color: #fca5a5; }
  .btn-danger:hover:not(:disabled)   { background: #b91c1c; color: #fff; }
  .btn-secondary { background: #334155; color: #cbd5e1; }
  .btn-secondary:hover:not(:disabled) { background: #475569; color: #f1f5f9; }
  /* ── Model cards ─────────────────────────────────────────────────────── */
  #local-list { display: flex; flex-direction: column; gap: 0.5rem; }
  .model-card {
    display: flex; align-items: center; justify-content: space-between;
    border: 1px solid #334155; border-radius: 7px; padding: 0.625rem 0.75rem;
    background: #0f172a;
  }
  .model-meta { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .model-name { font-size: 0.875rem; font-weight: 500; color: #f1f5f9; word-break: break-all; }
  .model-detail { font-size: 0.75rem; color: #64748b; }
  .badge { font-size: 0.7rem; font-weight: 600; padding: 2px 7px; border-radius: 10px; white-space: nowrap; }
  .badge-loaded   { background: #14532d; color: #86efac; }
  .badge-unloaded { background: #1e293b; color: #64748b; }
  /* ── Right panel ─────────────────────────────────────────────────────── */
  .hint { font-size: 0.8rem; color: #64748b; margin-bottom: 0.875rem; }
  .hint a { color: #60a5fa; }
  .hint a:hover { color: #93c5fd; }
  .input-row { display: flex; gap: 0.5rem; margin-bottom: 0.875rem; }
  label { color: #94a3b8; }
  input[type="text"] {
    flex: 1; padding: 6px 10px;
    background: #0f172a; border: 1px solid #334155; border-radius: 5px;
    color: #f1f5f9; font-size: 0.875rem; outline: none;
  }
  input[type="text"]::placeholder { color: #475569; }
  input[type="text"]:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
  /* ── File list ───────────────────────────────────────────────────────── */
  #repo-results { display: flex; flex-direction: column; gap: 0; }
  .file-row {
    display: flex; align-items: center; gap: 0.5rem;
    padding: 0.5rem 0; border-bottom: 1px solid #334155;
  }
  .file-row:last-child { border-bottom: none; }
  .file-name { font-size: 0.8rem; font-family: monospace; flex: 1; word-break: break-all; color: #cbd5e1; }
  .file-size { font-size: 0.75rem; color: #475569; white-space: nowrap; }
  /* ── Messages ────────────────────────────────────────────────────────── */
  .msg-error   { color: #f87171; font-size: 0.825rem; margin-top: 0.5rem; }
  .msg-empty   { color: #475569; font-size: 0.825rem; font-style: italic; text-align: center; padding: 1rem 0; }
  .msg-loading { color: #64748b; font-size: 0.825rem; }
  /* ── Status bar ──────────────────────────────────────────────────────── */
  :root { --log-height: 200px; }
  #status-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #020617; color: #64748b;
    font-family: 'Menlo', 'Consolas', monospace;
    font-size: 0.7rem; line-height: 1.4;
    border-top: 2px solid #1e293b;
    z-index: 100; transition: border-color 0.2s;
  }
  #status-bar.active { border-top-color: #3b82f6; }
  #status-resize-handle {
    display: none; height: 5px;
    cursor: ns-resize; background: #1e293b;
    transition: background 0.15s;
  }
  #status-resize-handle:hover,
  #status-resize-handle.dragging { background: #334155; }
  #status-bar.expanded #status-resize-handle { display: block; }
  #status-bar-main {
    display: flex; align-items: center; gap: 0.75rem;
    padding: 6px 1rem; min-height: 32px;
    cursor: pointer; user-select: none;
  }
  #status-bar-label {
    color: #334155; white-space: nowrap;
    border-right: 1px solid #1e293b; padding-right: 0.75rem;
    font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em;
  }
  #status-bar-text { flex: 1; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  #status-bar.active #status-bar-text { color: #e2e8f0; }
  #status-bar-chevron {
    color: #334155; font-size: 0.65rem; flex-shrink: 0;
    transition: transform 0.2s;
  }
  #status-bar.expanded #status-bar-chevron { transform: rotate(180deg); }
  #status-log-wrapper { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; }
  #status-bar.expanded #status-log-wrapper { max-height: var(--log-height); }
  #status-log {
    height: var(--log-height); overflow-y: auto;
    padding: 0.375rem 1rem;
    border-top: 1px solid #1e293b;
    color: #94a3b8; white-space: pre-wrap; word-break: break-all;
    user-select: text; cursor: text;
  }
  #status-log .log-line { display: block; }
  /* ── Disk bar ────────────────────────────────────────────────────────── */
  .disk-info { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }
  .disk-bar-track {
    width: 72px; height: 6px; border-radius: 3px;
    background: #1e293b; overflow: hidden;
  }
  .disk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s, background 0.5s; }
  .disk-bar-fill.ok     { background: #16a34a; }
  .disk-bar-fill.warn   { background: #d97706; }
  .disk-bar-fill.danger { background: #dc2626; }
  #disk-label { font-size: 0.7rem; color: #64748b; white-space: nowrap; font-family: 'Menlo','Consolas',monospace; }
  /* ── File row states ─────────────────────────────────────────────────── */
  .file-row-toobig .file-name { color: #f87171; }
  .file-row-toobig .file-size { color: #f87171; }
  .file-row-toobig .dl-btn   { background: #7f1d1d; color: #fca5a5; }
  /* ── Cancel button ───────────────────────────────────────────────────── */
  #cancel-btn {
    background: #7f1d1d; color: #fca5a5; border: none;
    font-size: 0.68rem; padding: 2px 8px; border-radius: 4px;
    cursor: pointer; flex-shrink: 0; display: none;
  }
  #cancel-btn:hover { background: #991b1b; }

  /* ── Light mode ──────────────────────────────────────────────────────── */
  html.light body            { background: #f8fafc; color: #0f172a; }
  html.light header          { background: #f1f5f9; color: #0f172a; border-bottom-color: #cbd5e1; }
  html.light #app-version    { color: #94a3b8; }
  html.light #theme-toggle   { border-color: #cbd5e1; color: #475569; }
  html.light #theme-toggle:hover { background: #e2e8f0; color: #0f172a; }
  html.light .btn-restart    { border-color: #cbd5e1; color: #475569; }
  html.light .btn-restart:hover:not(:disabled) { background: #e2e8f0; color: #0f172a; }
  html.light section         { background: #ffffff; border-color: #e2e8f0; }
  html.light .section-header h2 { color: #1e293b; }
  html.light .btn-secondary  { background: #e2e8f0; color: #475569; }
  html.light .btn-secondary:hover:not(:disabled) { background: #cbd5e1; color: #0f172a; }
  html.light .model-card     { background: #f8fafc; border-color: #e2e8f0; }
  html.light .model-name     { color: #1e293b; }
  html.light .model-detail   { color: #94a3b8; }
  html.light .badge-loaded   { background: #dcfce7; color: #166534; }
  html.light .badge-unloaded { background: #f1f5f9; color: #94a3b8; }
  html.light .hint           { color: #94a3b8; }
  html.light .hint a         { color: #2563eb; }
  html.light .hint a:hover   { color: #1d4ed8; }
  html.light label           { color: #475569; }
  html.light input[type="text"] { background: #fff; border-color: #cbd5e1; color: #0f172a; }
  html.light input[type="text"]::placeholder { color: #94a3b8; }
  html.light .file-row       { border-bottom-color: #e2e8f0; }
  html.light .file-name      { color: #475569; }
  html.light .file-size      { color: #94a3b8; }
  html.light .msg-error      { color: #dc2626; }
  html.light .msg-empty      { color: #94a3b8; }
  html.light .msg-loading    { color: #94a3b8; }
  html.light .status-online  { background: #dcfce7; color: #166534; }
  html.light .status-offline { background: #fee2e2; color: #991b1b; }
  html.light .status-unknown { background: #f1f5f9; color: #64748b; }
  html.light #status-bar     { background: #f1f5f9; color: #64748b; border-top-color: #e2e8f0; }
  html.light #status-bar.active { border-top-color: #3b82f6; }
  html.light #status-resize-handle { background: #e2e8f0; }
  html.light #status-resize-handle:hover,
  html.light #status-resize-handle.dragging { background: #cbd5e1; }
  html.light #status-log     { border-top-color: #e2e8f0; color: #64748b; }
  html.light #status-bar-label { color: #94a3b8; border-right-color: #e2e8f0; }
  html.light #status-bar.active #status-bar-text { color: #0f172a; }
  html.light #status-bar-chevron { color: #cbd5e1; }
  /* ── Disk bar ────────────────────────────────────────────────────────────── */
  .disk-bar-wrap { display: flex; align-items: center; gap: 0.5rem; font-size: 0.7rem; color: #64748b; flex-shrink: 0; }
  .disk-bar { height: 6px; width: 80px; background: #1e293b; border-radius: 3px; overflow: hidden; }
  .disk-bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .disk-bar-fill.ok   { background: #22c55e; }
  .disk-bar-fill.warn { background: #f59e0b; }
  .disk-bar-fill.crit { background: #ef4444; }
  html.light .disk-bar { background: #e2e8f0; }
  /* ── Vision & preset badges ──────────────────────────────────────────────── */
  .badge-vision      { background: #1e3a5f; color: #7dd3fc; }
  .badge-warn-preset { background: #7c2d12; color: #fdba74; }
  /* ── Oversized file row ──────────────────────────────────────────────────── */
  .file-row-toobig .file-name,
  .file-row-toobig .file-size { color: #f87171; }
  html.light .file-row-toobig .file-name,
  html.light .file-row-toobig .file-size { color: #dc2626; }
  /* ── Mmproj selector ─────────────────────────────────────────────────────── */
  .file-row-inner { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
  .vision-select-row { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }
  .vision-select-row label { font-size: 0.7rem; color: #64748b; white-space: nowrap; }
  select.mmproj-select {
    font-size: 0.75rem; padding: 3px 6px;
    background: #0f172a; border: 1px solid #334155; border-radius: 4px;
    color: #f1f5f9; outline: none; max-width: 280px;
  }
  html.light select.mmproj-select { background: #fff; border-color: #cbd5e1; color: #0f172a; }
  /* ── Cancel button ───────────────────────────────────────────────────────── */
  #cancel-dl-btn {
    display: none; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px;
    background: #7f1d1d; color: #fca5a5; border: none; cursor: pointer;
    white-space: nowrap; flex-shrink: 0;
  }
  #cancel-dl-btn:hover { background: #991b1b; }
</style>
</head>
<body>
<header>
  <div class="header-title">
    <h1>gguf-manager</h1>
    <span id="app-version"></span>
  </div>
  <span id="status-indicator" class="status-unknown">connecting…</span>
  <div class="disk-bar-wrap" id="disk-info" style="display:none">
    <div class="disk-bar"><div class="disk-bar-fill ok" id="disk-bar-fill" style="width:0%"></div></div>
    <span id="disk-text"></span>
  </div>
  <button id="theme-toggle" title="Toggle light/dark mode">☀</button>
  <button class="btn-restart" id="restart-btn">Restart Service</button>
</header>
<main>
  <!-- Left panel: Local Models -->
  <section>
    <div class="section-header">
      <h2>Local Models</h2>
      <button class="btn-secondary" id="refresh-btn">Refresh</button>
    </div>
    <div id="local-error" class="msg-error" style="display:none"></div>
    <div id="local-list"><p class="msg-loading">Loading…</p></div>
  </section>

  <!-- Right panel: Add Model -->
  <section>
    <div class="section-header">
      <h2>Add Model</h2>
    </div>
    <p class="hint">
      Find models at
      <a href="https://huggingface.co/models?library=gguf" target="_blank" rel="noopener">HuggingFace GGUF models</a>
    </p>
    <label for="repo-input" style="font-size:0.825rem;font-weight:500;display:block;margin-bottom:4px">HuggingFace repo ID</label>
    <div class="input-row">
      <input type="text" id="repo-input" placeholder="e.g. unsloth/Qwen3-Coder-Next-GGUF" autocomplete="off" spellcheck="false">
      <button class="btn-primary" id="browse-btn">Browse</button>
    </div>
    <div id="repo-error" class="msg-error" style="display:none"></div>
    <div id="repo-results"></div>
  </section>
</main>

<!-- Status bar -->
<div id="status-bar">
  <div id="status-log-wrapper">
    <div id="status-resize-handle"></div>
    <div id="status-log"></div>
  </div>
  <div id="status-bar-main">
    <span id="status-bar-label">Ready</span>
    <span id="status-bar-text"></span>
    <button id="cancel-dl-btn">Cancel</button>
    <span id="status-bar-chevron">▲</span>
  </div>
</div>

<script>
'use strict';

let downloadInProgress = false;
let activeEventSource = null;
let warnDownloadBytes = 0;
let diskFreeBytes = 0;

// ── Theme ──────────────────────────────────────────────────────────────────

(function initTheme() {
  const stored = localStorage.getItem('theme');
  const isLight = stored === 'light';
  if (isLight) document.documentElement.classList.add('light');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀';
})();

document.getElementById('theme-toggle').addEventListener('click', () => {
  const isLight = document.documentElement.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = isLight ? '🌙' : '☀';
});

// ── Utilities ──────────────────────────────────────────────────────────────

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function formatBytes(n) {
  if (n == null) return 'unknown';
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n / 1024).toFixed(1) + ' KB';
  if (n < 1073741824) return (n / 1048576).toFixed(1) + ' MB';
  return (n / 1073741824).toFixed(2) + ' GB';
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

function clearErr(id) { showErr(id, ''); }

// ── Status bar ─────────────────────────────────────────────────────────────

function appendLogLine(line) {
  const log = document.getElementById('status-log');
  const atBottom = log.scrollHeight - log.scrollTop <= log.clientHeight + 4;
  const span = document.createElement('span');
  span.className = 'log-line';
  span.textContent = line;
  log.appendChild(span);
  if (atBottom) log.scrollTop = log.scrollHeight;
}

function setStatusBar(label, text, active) {
  const bar = document.getElementById('status-bar');
  document.getElementById('status-bar-label').textContent = label;
  document.getElementById('status-bar-text').textContent = text;
  bar.classList.toggle('active', active);
  if (text) appendLogLine(text);
}

function toggleStatusBar() {
  const bar = document.getElementById('status-bar');
  bar.classList.toggle('expanded');
  if (bar.classList.contains('expanded')) {
    const log = document.getElementById('status-log');
    log.scrollTop = log.scrollHeight;
  }
}

document.getElementById('status-bar-main').addEventListener('click', toggleStatusBar);

// ── Log resize ─────────────────────────────────────────────────────────────

(function initResize() {
  const handle = document.getElementById('status-resize-handle');
  let startY = 0, startHeight = 200;

  handle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    startY = e.clientY;
    startHeight = parseInt(getComputedStyle(document.documentElement)
      .getPropertyValue('--log-height'), 10) || 200;
    handle.classList.add('dragging');

    function onMove(e) {
      const height = Math.max(80, Math.min(600, startHeight + (startY - e.clientY)));
      document.documentElement.style.setProperty('--log-height', height + 'px');
    }
    function onUp() {
      handle.classList.remove('dragging');
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onUp);
    }
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
  });
})();

// ── Local models ───────────────────────────────────────────────────────────

async function fetchLocalModels() {
  clearErr('local-error');
  try {
    const resp = await fetch('/api/local');
    if (!resp.ok) throw new Error(await resp.text());
    const models = await resp.json();
    renderLocalModels(models);
  } catch (e) {
    showErr('local-error', 'Failed to load local models: ' + e.message);
    document.getElementById('local-list').innerHTML = '';
  }
}

function renderLocalModels(models) {
  const list = document.getElementById('local-list');
  if (!models.length) {
    list.innerHTML = '<p class="msg-empty">No models found in models directory.</p>';
    return;
  }
  list.innerHTML = '';
  for (const m of models) {
    const card = document.createElement('div');
    card.className = 'model-card';
    const visionBadge = m.isVision ? ' <span class="badge badge-vision">Vision</span>' : '';
    const presetWarn = m.isVision && !m.inPreset
      ? ' <span class="badge badge-warn-preset" title="Not in managed.ini — add to preset so llama-server loads it">Preset missing</span>'
      : '';
    card.innerHTML = `
      <div class="model-meta">
        <span class="model-name">${esc(m.name)}${visionBadge}${presetWarn}</span>
        <span class="model-detail">
          ${esc(formatBytes(m.sizeBytes))} &middot; ${m.files.length} file${m.files.length !== 1 ? 's' : ''}
          &nbsp;<span class="badge ${m.loaded ? 'badge-loaded' : 'badge-unloaded'}">${m.loaded ? 'Loaded' : 'Unloaded'}</span>
        </span>
      </div>
      <button class="btn-danger delete-btn">Delete</button>
    `;
    card.querySelector('.delete-btn').addEventListener('click', () => deleteModel(m.name));
    list.appendChild(card);
  }
}

async function deleteModel(name) {
  if (!confirm(`Delete model "${name}"?\n\nThis will remove all files and cannot be undone.`)) return;
  clearErr('local-error');
  try {
    const resp = await fetch('/api/local/' + encodeURIComponent(name), { method: 'DELETE' });
    if (resp.status === 404) { showErr('local-error', 'Model not found.'); return; }
    if (!resp.ok) throw new Error(await resp.text());
    setStatusBar('Ready', 'Model deleted, restarting service…', false);
    fetchLocalModels();
  } catch (e) {
    showErr('local-error', 'Delete failed: ' + e.message);
  }
}

// ── Repo browser ───────────────────────────────────────────────────────────

async function browseRepo() {
  const repoId = document.getElementById('repo-input').value.trim();
  if (!repoId) return;
  clearErr('repo-error');
  const results = document.getElementById('repo-results');
  results.innerHTML = '<p class="msg-loading">Fetching file list…</p>';
  try {
    const resp = await fetch('/api/repo?id=' + encodeURIComponent(repoId));
    if (!resp.ok) throw new Error(await resp.text());
    const info = await resp.json();
    renderRepoInfo(repoId, info);
  } catch (e) {
    results.innerHTML = '';
    showErr('repo-error', 'Failed to fetch repo: ' + e.message);
  }
}

function defaultMmproj(mmprojFiles) {
  const f16 = mmprojFiles.find(f => f.filename.toLowerCase().includes('f16'));
  return (f16 || mmprojFiles[0] || {}).filename || '';
}

function renderRepoInfo(repoId, info) {
  const results = document.getElementById('repo-results');
  const files = info.models || [];
  if (!files.length && !(info.mmproj || []).length) {
    results.innerHTML = '<p class="msg-empty">No GGUF files found in this repo.</p>';
    return;
  }
  results.innerHTML = '';

  if (info.isVision) {
    const hdr = document.createElement('div');
    hdr.style.cssText = 'padding:4px 0 8px;font-size:0.78rem;color:#7dd3fc';
    hdr.innerHTML = '<span class="badge badge-vision">Vision model</span> &nbsp;Includes a multimodal projector (mmproj) for image understanding.';
    results.appendChild(hdr);
  }

  for (const f of files) {
    const tooBig = diskFreeBytes > 0 && f.size != null && f.size > diskFreeBytes;
    const row = document.createElement('div');
    row.className = 'file-row' + (tooBig ? ' file-row-toobig' : '');

    let mmprojSelectHtml = '';
    if (info.isVision && (info.mmproj || []).length > 0) {
      const defVal = defaultMmproj(info.mmproj);
      const opts = info.mmproj.map(m =>
        `<option value="${esc(m.filename)}" ${m.filename === defVal ? 'selected' : ''}>${esc(m.filename)}${m.size != null ? ' (' + formatBytes(m.size) + ')' : ''}</option>`
      ).join('');
      mmprojSelectHtml = `<div class="vision-select-row"><label>mmproj:</label><select class="mmproj-select">${opts}</select></div>`;
    }

    row.innerHTML = `
      <div class="file-row-inner">
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="file-name">${esc(f.filename)}</span>
          <span class="file-size">${esc(formatBytes(f.size))}</span>
          ${tooBig ? '<span class="badge" style="background:#7f1d1d;color:#fca5a5">Insufficient space</span>' : ''}
        </div>
        ${mmprojSelectHtml}
      </div>
      <button class="btn-primary dl-btn" ${downloadInProgress ? 'disabled' : ''}>Download</button>
    `;

    const btn = row.querySelector('.dl-btn');
    btn.addEventListener('click', () => {
      const sel = row.querySelector('.mmproj-select');
      const mmprojFile = sel ? sel.value : '';
      const totalSize = (f.size || 0) + (sel ? (info.mmproj.find(m => m.filename === sel.value)?.size || 0) : 0);
      startDownload(repoId, f.filename, mmprojFile, totalSize);
    });
    results.appendChild(row);
  }
}

// ── Download ───────────────────────────────────────────────────────────────

async function startDownload(repoId, filename, mmprojFile, totalSize) {
  if (downloadInProgress) return;
  if (warnDownloadBytes > 0 && totalSize != null && totalSize > warnDownloadBytes) {
    const gb = (totalSize / 1073741824).toFixed(2);
    if (!confirm(`This download is ${gb} GB. Continue?`)) return;
  }
  try {
    const body = { repoId, filename };
    if (mmprojFile) body.mmprojFile = mmprojFile;
    const resp = await fetch('/api/download', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(await resp.text());
  } catch (e) {
    setStatusBar('Error', 'Failed to start download: ' + e.message, false);
    return;
  }
  setDownloadState(true);
  setStatusBar('Download', 'Starting…', true);
  openSSE();
}

async function cancelDownload() {
  await fetch('/api/download/cancel', { method: 'POST' });
}

function openSSE() {
  if (activeEventSource) {
    activeEventSource.close();
    activeEventSource = null;
  }

  const es = new EventSource('/api/download/status');
  activeEventSource = es;

  es.addEventListener('line', (e) => {
    setStatusBar('Download', JSON.parse(e.data), true);
  });

  es.addEventListener('status', (e) => {
    const msg = JSON.parse(e.data);
    es.close();
    activeEventSource = null;
    if (msg.status === 'done') {
      setStatusBar('Ready', 'Download complete', false);
      setDownloadState(false);
      fetchLocalModels();
    } else if (msg.status === 'idle') {
      setStatusBar('Ready', '', false);
      setDownloadState(false);
    }
  });

  es.onerror = () => {
    es.close();
    activeEventSource = null;
    setStatusBar('Error', 'Connection lost', false);
    setDownloadState(false);
  };
}

function setDownloadState(inProgress) {
  downloadInProgress = inProgress;
  document.querySelectorAll('.dl-btn').forEach(btn => { btn.disabled = inProgress; });
  document.getElementById('cancel-dl-btn').style.display = inProgress ? 'inline-block' : 'none';
}

// ── Restart service ────────────────────────────────────────────────────────

async function restartService() {
  const btn = document.getElementById('restart-btn');
  btn.disabled = true;
  setStatusBar('Restart', 'Restarting llama-server…', true);
  try {
    const resp = await fetch('/api/restart', { method: 'POST' });
    if (!resp.ok) throw new Error(await resp.text());
    setStatusBar('Ready', 'Service restarted successfully', false);
    pollStatus();
  } catch (e) {
    setStatusBar('Error', 'Restart failed: ' + e.message, false);
  } finally {
    btn.disabled = false;
  }
}

// ── Status polling ─────────────────────────────────────────────────────────

async function pollStatus() {
  try {
    const resp = await fetch('/api/status');
    if (!resp.ok) return;
    const s = await resp.json();
    const el = document.getElementById('status-indicator');
    el.textContent = s.llamaReachable ? 'llama-server: online' : 'llama-server: offline';
    el.className = 'status-indicator ' + (s.llamaReachable ? 'status-online' : 'status-offline');
    if (s.version) {
      const ver = document.getElementById('app-version');
      if (!ver.textContent) ver.textContent = s.version;
    }
    if (s.disk && s.disk.totalBytes > 0) {
      diskFreeBytes = s.disk.freeBytes;
      const pct = Math.round(s.disk.usedBytes / s.disk.totalBytes * 100);
      const fill = document.getElementById('disk-bar-fill');
      fill.style.width = pct + '%';
      fill.className = 'disk-bar-fill ' + (pct >= 90 ? 'crit' : pct >= 75 ? 'warn' : 'ok');
      document.getElementById('disk-text').textContent = formatBytes(s.disk.freeBytes) + ' free';
      document.getElementById('disk-info').style.display = 'flex';
    }
    if (s.warnDownloadBytes) warnDownloadBytes = s.warnDownloadBytes;
    if (!s.downloadInProgress && downloadInProgress && !activeEventSource) {
      setDownloadState(false);
    }
  } catch (_) { /* network error, ignore */ }
}

// ── Init ───────────────────────────────────────────────────────────────────

document.getElementById('refresh-btn').addEventListener('click', fetchLocalModels);
document.getElementById('browse-btn').addEventListener('click', browseRepo);
document.getElementById('restart-btn').addEventListener('click', restartService);
document.getElementById('cancel-dl-btn').addEventListener('click', cancelDownload);
document.getElementById('repo-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') browseRepo();
});

fetchLocalModels();
pollStatus();
setInterval(pollStatus, 5000);
</script>
