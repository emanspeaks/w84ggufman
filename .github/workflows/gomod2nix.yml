name: Update gomod2nix.toml

on:
  push:
    paths:
      - go.mod
      - go.sum

permissions:
  contents: write

jobs:
  update:
    name: Regenerate gomod2nix.toml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: DeterminateSystems/nix-installer-action@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Regenerate gomod2nix.toml
        run: nix run github:nix-community/gomod2nix -- generate

      - name: Commit if changed
        run: |
          git diff --quiet gomod2nix.toml && exit 0
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gomod2nix.toml
          git commit -m "nix: regenerate gomod2nix.toml"
          git push
